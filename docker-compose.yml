services:
  gemini2mqtt:
    build: .
    image: gemini2mqtt:latest
    restart: unless-stopped
    environment:
      # ── MQTT ───────────────────────────────────────────────────────────────
      MQTT_HOST: "${MQTT_HOST:-mosquitto}"
      MQTT_PORT: "${MQTT_PORT:-1883}"
      MQTT_USERNAME: "${MQTT_USERNAME:-}"
      MQTT_PASSWORD: "${MQTT_PASSWORD:-}"
      MQTT_PROMPT_TOPIC: "${MQTT_PROMPT_TOPIC:-gemini2mqtt/prompt}"

      # ── Gemini CLI ─────────────────────────────────────────────────────────
      GEMINI_CLI_PATH: "${GEMINI_CLI_PATH:-gemini}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-2.5-pro-preview-03-25}"

      # ── Vertex AI (optional) ───────────────────────────────────────────────
      VERTEX_CLI_PATH: "${VERTEX_CLI_PATH:-gemini}"
      VERTEX_PROJECT: "${VERTEX_PROJECT:-}"
      VERTEX_LOCATION: "${VERTEX_LOCATION:-europe-west3}"
    # Mount Google Cloud credentials if needed for Vertex AI
    volumes:
      - "${GCLOUD_CREDENTIALS_PATH:-/dev/null}:/app/credentials/gcloud.json:ro"
    env_file:
      - .env
